<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cantinho Do Bule</title>
    <link rel="icon" href="Icon.avif">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <nav class="container">
            <span class="brand">Cantinho Do Bule</span>
            <ul class="nav-links">
                <li><a href="#inicio">Sobre</a></li>
                <li><a href="#promo">Desconto</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="inicio" class="hero-banner">
            <div class="hero-overlay">
                <h1>O seu momento especial em Gravataí</h1>
                <p>Cafés artesanais e ambiente acolhedor.</p>
            </div>
        </section>

        <section id="about" class="content-section container">
            <h2>Nossas Especialidades</h2>
            <div class="grid-features">
                <div class="feature-card">
                    <img src="Cafe.avif">
                    <span>Cafés Artesanais</span>
                </div>
                <div class="feature-card">
                    <img src="Salgados.avif">
                    <span>Salgados Artesanais</span>
                </div>
                <div class="feature-card">
                    <img src="Doces.avif" alt="Doce">
                    <span>Doces Artesanais</span>
                </div>
            </div>
        </section>

        <section id="promo" class="promo-section">
            <div class="container flex-center">
                <div class="card-form">
                    <h3>Ganhe Desconto na 1ª Visita</h3>
                    <form id="form-discount">
                        <div class="field">
                            <label>Nome Completo</label>
                            <input type="text" name="user_name" required>
                        </div>
                        <div class="field">
                            <label>WhatsApp</label>
                            <input type="tel" name="user_phone" placeholder="(51) 90000-0000" required>
                        </div>
                        <div class="field">
                            <label>Endereço</label>
                            <input type="text" name="user_address" required>
                        </div>
                        <div class="field">
                            <label>Sexo</label>
                            <select name="user_gender" required>
                                <option value="">Selecione</option>
                                <option value="F">Feminino</option>
                                <option value="M">Masculino</option>
                                <option value="O">Outro</option>
                            </select>
                        </div>
                        <button type="submit" class="btn-primary">Gerar Cupom</button>
                    </form>
                    <div id="feedback-msg" class="is-hidden"></div>
                </div>
            </div>
        </section>
    </main>

    <footer class="main-footer">
        <p>&copy; 2026 Cantinho Do Bule - Gravataí/RS <br>
            Devs Thyago Fofonka e Luiz Henrique
        </p>
    </footer>

    <script src="js.js"></script>
</body>
</html>
